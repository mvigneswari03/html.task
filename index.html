<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-container">

</div>
<script src="auth.js"></script>
</body>
</html>
