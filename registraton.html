<!DOCTYPE html>
<html>
<head>
    <title>Engineering College Registration Form</title>
</head>
<body>

    <h2>Engineering College Registration Form</h2>

    <form>

        <label>Student Name:</label><br>
        <input type="text"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Mobile Number:</label><br>
        <input type="tel"><br><br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30"></textarea><br><br>

        <label>Admission Type:</label><br>
        <input type="radio" name="course"> UG
        <input type="radio" name="course"> PG
        <input type="radio" name="course"> PhD
        <br><br>

        <label>Department:</label><br>
        <select>
            <option>Computer Science and Engineering</option>
            <option>Information Technology</option>
            <option>Electronics and Communication Engineering</option>
            <option>Electrical and Electronics Engineering</option>
            <option>Mechanical Engineering</option>
            <option>Civil Engineering</option>
        </select>
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear">

    </form>

</body>
</html>
